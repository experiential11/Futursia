# Futursia Website Configuration
# Website-only runtime (Node/Express + frontend)

app:
  name: "Futursia Web"
  host: "127.0.0.1"
  port: 5000

market:
  provider: "yfinance"
  watch_symbols: ["AAPL", "MSFT", "NVDA", "7203.T", "6758.T", "9984.T", "8306.T", "7974.T"]
  symbol_names:
    "7203.T": "Toyota Motor Corporation"
    "6758.T": "Sony Group Corporation"
    "9984.T": "SoftBank Group Corporation"
    "8306.T": "Mitsubishi UFJ Financial Group"
    "7974.T": "Nintendo Co., Ltd."

refresh:
  quote_poll_interval: 3
  forecast_recompute_interval: 15
  bars_refresh_interval: 5
  market_status_check_interval: 300

forecast:
  horizon_minutes: 40
  features_lookback_minutes: 240
  min_bars_for_forecast: 100
  primary_model: "ridge"

news:
  enabled: true
  provider: "newsapi"
  headline_limit: 10

ui:
  theme: "dark"
